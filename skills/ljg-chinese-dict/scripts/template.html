<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>汉语新解</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0d0f12;
    --card-bg: #151820;
    --surface: #1c1f28;
    --accent: #4a9eff;
    --accent2: #ff6b6b;
    --text: #e4dfd6;
    --text-dim: #8a867e;
    --border: #2a2d38;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', 'Georgia', serif;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    width: 1080px;
    min-height: 1350px;
    display: flex;
    flex-direction: column;
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    padding: 100px 100px 60px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -80px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(74,158,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .hero-word {
    font-size: 180px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
    margin-bottom: 24px;
    letter-spacing: -8px;
  }

  .hero-phonetic {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 4px;
    margin-bottom: 48px;
  }

  /* ── Translations ── */
  .translations {
    display: flex;
    gap: 48px;
    margin-bottom: 60px;
  }

  .trans-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .trans-lang {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--bg);
    background: var(--accent);
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .trans-lang.jp {
    background: var(--accent2);
  }

  .trans-text {
    font-size: 20px;
    color: var(--text);
  }

  /* ── Divider ── */
  .divider {
    width: 120px;
    height: 2px;
    background: linear-gradient(to right, var(--accent), transparent);
    margin-bottom: 48px;
  }

  /* ── Explanation ── */
  .explanation {
    padding: 60px 100px;
    background: var(--card-bg);
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .section-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .explanation-text {
    font-size: 32px;
    line-height: 1.9;
    color: var(--text);
    max-width: 880px;
  }

  /* ── Decorative Elements ── */
  .deco-dots {
    position: absolute;
    bottom: 40px;
    left: 100px;
    display: flex;
    gap: 8px;
  }

  .deco-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .deco-dot:nth-child(2) { opacity: 0.6; }
  .deco-dot:nth-child(3) { opacity: 0.3; }

  .deco-line {
    position: absolute;
    bottom: 44px;
    right: 100px;
    width: 80px;
    height: 2px;
    background: var(--accent2);
  }

  /* ── Footer ── */
  .footer {
    padding: 40px 100px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-brand {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  .footer-date {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    color: var(--text-dim);
  }
</style>
</head>
<body>
<div class="container">
  <!-- Hero Section -->
  <div class="hero">
    <div class="hero-label">汉语新解</div>
    <div class="hero-word">{{WORD}}</div>
    <div class="hero-phonetic">{{PINYIN}}</div>

    <div class="translations">
      <div class="trans-item">
        <span class="trans-lang">EN</span>
        <span class="trans-text">{{ENGLISH}}</span>
      </div>
      <div class="trans-item">
        <span class="trans-lang jp">JP</span>
        <span class="trans-text">{{JAPANESE}}</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="deco-dots">
      <div class="deco-dot"></div>
      <div class="deco-dot"></div>
      <div class="deco-dot"></div>
    </div>
    <div class="deco-line"></div>
  </div>

  <!-- Explanation Section -->
  <div class="explanation">
    <div class="section-label">释义</div>
    <div class="explanation-text">{{EXPLANATION}}</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-brand">LJG · 汉语新解</span>
    <span class="footer-date">{{DATE}}</span>
  </div>
</div>
</body>
</html>
