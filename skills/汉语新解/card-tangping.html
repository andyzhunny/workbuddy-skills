<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600">
<title>汉语新解</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0d0f12;
    --card-bg: #151820;
    --surface: #1c1f28;
    --accent: #4a9eff;
    --accent2: #c46b3a;
    --text: #e4dfd6;
    --text-dim: #8a867e;
    --border: #2a2d38;
    --highlight: #f0c96e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 600px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', 'Georgia', serif;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 600px;
    min-height: 800px;
    background: var(--card-bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 50px;
  }

  /* 装饰性几何色块 */
  .geo-block {
    position: absolute;
    border-radius: 4px;
  }
  .geo-red { top: 30px; left: 30px; width: 80px; height: 50px; background: #E53935; opacity: 0.85; }
  .geo-blue { top: 30px; right: 30px; width: 60px; height: 70px; background: #1E88E5; opacity: 0.85; }
  .geo-yellow { bottom: 40px; left: 30px; width: 70px; height: 35px; background: #FDD835; opacity: 0.85; }
  .geo-black { bottom: 40px; right: 30px; width: 45px; height: 45px; background: #212121; opacity: 0.85; }

  /* 标题 */
  .header {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.9;
  }

  /* 分隔线 */
  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 20px 0;
  }

  /* 词汇 */
  .word {
    font-family: 'Noto Serif SC', serif;
    font-size: 96px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: 8px;
    line-height: 1.1;
    margin-bottom: 8px;
    text-shadow: 0 4px 30px rgba(74, 158, 255, 0.15);
  }

  /* 拼音 */
  .pinyin {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 4px;
    margin-bottom: 24px;
  }

  /* 语言标签 */
  .lang-tags {
    display: flex;
    gap: 16px;
    margin-bottom: 40px;
  }
  .lang-tag {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 1px;
    opacity: 0.7;
  }
  .lang-tag span {
    color: var(--accent);
    font-weight: 700;
  }

  /* 装饰点 */
  .dots {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    letter-spacing: 6px;
    color: var(--text-dim);
    opacity: 0.4;
    margin: 16px 0;
  }

  /* 核心解释 */
  .explanation {
    max-width: 480px;
    text-align: center;
  }

  .quote-mark {
    font-family: 'Georgia', serif;
    font-size: 60px;
    color: var(--accent);
    opacity: 0.3;
    line-height: 0.5;
    margin-bottom: 10px;
  }

  .quote-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.7;
    letter-spacing: 2px;
  }

  /* 底部装饰 */
  .footer-wave {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    letter-spacing: 8px;
    color: var(--text-dim);
    opacity: 0.3;
    margin-top: auto;
    padding-top: 50px;
  }

  .footer-brand {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
    opacity: 0.4;
    margin-top: 16px;
    text-transform: uppercase;
  }

</style>
</head>
<body>
<div class="card">
  <!-- 几何装饰 -->
  <div class="geo-block geo-red"></div>
  <div class="geo-block geo-blue"></div>
  <div class="geo-block geo-yellow"></div>
  <div class="geo-block geo-black"></div>

  <!-- 标题 -->
  <div class="header">汉语新解</div>
  <div class="divider"></div>

  <!-- 词汇 -->
  <div class="word">躺平</div>
  <div class="pinyin">tǎng píng</div>

  <!-- 语言 -->
  <div class="lang-tags">
    <div class="lang-tag">EN <span>Lie Flat</span></div>
    <div class="lang-tag">JP <span>寝ること</span></div>
  </div>

  <div class="dots">· · ·</div>

  <!-- 解释 -->
  <div class="explanation">
    <div class="quote-mark">"</div>
    <div class="quote-text">拒绝为一部强制入场的烂片鼓掌，尤其还是循环播放的那种。</div>
  </div>

  <!-- 底部 -->
  <div class="footer-wave">∿ ∿ ∿</div>
  <div class="footer-brand">汉语新解 · 一词一世界</div>
</div>
</body>
</html>
